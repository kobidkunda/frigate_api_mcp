{% extends "partials/base.html" %}
{% block title %}API Explorer{% endblock %}
{% block content %}
<header class="mb-8">
<h1 class="text-3xl font-headline font-extrabold text-on-surface tracking-tight mb-2">API Explorer</h1>
<p class="text-on-surface-variant font-body">Endpoint catalog, safe endpoint testing guidance, and skill usage notes.</p>
</header>
<div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
    <section class="bg-surface-container-low p-6 rounded-xl border border-outline-variant/10 shadow-sm space-y-4 lg:col-span-2">
      <div class="flex items-center gap-2 mb-4">
        <span class="material-symbols-outlined text-primary">api</span>
        <h2 class="font-headline font-bold text-lg tracking-tight">Catalog</h2>
      </div>
      <div id="api-catalog" class="space-y-4"></div>
    </section>
    <section class="bg-surface-container-low p-6 rounded-xl border border-outline-variant/10 shadow-sm space-y-4 lg:col-span-2">
      <div class="flex items-center gap-2 mb-4">
        <span class="material-symbols-outlined text-secondary">menu_book</span>
        <h2 class="font-headline font-bold text-lg tracking-tight">Skill Usage Notes</h2>
      </div>
      <div id="skill-usage-notes" class="space-y-4 text-sm font-body text-on-surface-variant"></div>
    </section>
</div>
<script src="/static/api_explorer.js"></script>
{% endblock %}
