{% extends "partials/base.html" %}
{% block title %}Processed Events{% endblock %}
{% block content %}
<main class="flex-1 p-8 bg-surface-dim">
<header class="mb-8">
<h1 class="text-3xl font-headline font-extrabold text-on-surface tracking-tight mb-2">Processed Events</h1>
<p class="text-on-surface-variant font-body">Deep temporal analysis of AI classification events and camera telemetry.</p>
</header>
<!-- Filters Panel -->
<section class="bg-surface-container-low p-6 rounded-xl border border-outline-variant/10 mb-8 shadow-sm">
<form id="processedFilterForm" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-6 items-end">
<div class="space-y-2">
<label class="text-xs font-label uppercase tracking-widest text-outline">View Type</label>
<select name="view" class="w-full bg-surface-container-lowest border-b border-outline-variant text-on-surface py-2 px-3 focus:border-primary focus:ring-0 text-sm appearance-none cursor-pointer">
<option value="jobs">Jobs</option>
<option value="segments">Segments</option>
</select>
</div>
<div class="space-y-2">
<label class="text-xs font-label uppercase tracking-widest text-outline">Shift</label>
<select name="shift" class="w-full bg-surface-container-lowest border-b border-outline-variant text-on-surface py-2 px-3 focus:border-primary focus:ring-0 text-sm appearance-none cursor-pointer">
<option value="">All Shifts</option>
<option value="day">Day</option>
<option value="night">Night</option>
</select>
</div>
<div class="space-y-2">
<label class="text-xs font-label uppercase tracking-widest text-outline">Group ID</label>
<input name="group_id" type="number" min="1" class="w-full bg-surface-container-lowest border-b border-outline-variant text-on-surface py-2 px-3 focus:border-primary focus:ring-0 text-sm"/>
</div>
<div class="space-y-2 lg:col-span-2">
<label class="text-xs font-label uppercase tracking-widest text-outline">Timeline (From - To)</label>
<div class="flex items-center gap-2">
<input name="from" class="w-full bg-surface-container-lowest border-b border-outline-variant text-on-surface py-2 px-3 focus:border-primary focus:ring-0 text-sm" type="date"/>
<span class="text-outline">/</span>
<input name="to" class="w-full bg-surface-container-lowest border-b border-outline-variant text-on-surface py-2 px-3 focus:border-primary focus:ring-0 text-sm" type="date"/>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-label uppercase tracking-widest text-outline">Sort By</label>
<select name="sort_by" class="w-full bg-surface-container-lowest border-b border-outline-variant text-on-surface py-2 px-3 focus:border-primary focus:ring-0 text-sm appearance-none cursor-pointer">
<option value="time">Time</option>
<option value="camera">Camera</option>
<option value="status">Status</option>
<option value="confidence">Confidence</option>
<option value="label">Label</option>
</select>
</div>
<div class="space-y-2">
<label class="text-xs font-label uppercase tracking-widest text-outline">Direction</label>
<select name="sort_dir" class="w-full bg-surface-container-lowest border-b border-outline-variant text-on-surface py-2 px-3 focus:border-primary focus:ring-0 text-sm appearance-none cursor-pointer">
<option value="desc">Desc</option>
<option value="asc">Asc</option>
</select>
</div>
<div class="flex gap-2 lg:col-span-3">
<button type="submit" class="flex-1 bg-gradient-to-r from-primary to-on-primary-container text-on-primary py-2.5 rounded-md font-label font-bold text-xs uppercase tracking-widest hover:brightness-110 active:scale-[0.98] transition-all">
                            Apply Filters
                        </button>
<button type="button" onclick="document.getElementById('processedFilterForm').reset(); document.getElementById('processedFilterForm').dispatchEvent(new Event('submit'))" class="p-2.5 border border-outline-variant/30 text-on-surface-variant hover:bg-surface-container-highest rounded-md transition-colors">
<span class="material-symbols-outlined text-sm">refresh</span>
</button>
</div>
</form>
</section>
<!-- Data Grid / Table -->
<section class="bg-surface-container-low rounded-xl overflow-hidden border border-outline-variant/5 shadow-2xl relative min-h-[400px]">
<div id="processedEventsTable" class="overflow-x-auto p-4"></div>
<div class="flex justify-between items-center p-4 border-t border-outline-variant/10 bg-surface-container-lowest">
<button type="button" id="page-prev" class="px-4 py-2 bg-surface-container hover:bg-surface-bright rounded text-sm font-label uppercase tracking-widest transition-colors">Prev</button>
<span id="page-info" class="text-sm font-label text-outline">Page 1</span>
<button type="button" id="page-next" class="px-4 py-2 bg-surface-container hover:bg-surface-bright rounded text-sm font-label uppercase tracking-widest transition-colors">Next</button>
</div>
</section>
</main>
<script src="/static/processed_events.js"></script>
{% endblock %}
